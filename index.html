<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RIALO Protocol</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  text-align: center;
}

.logo {
  width: 140px;
  margin-top: 40px;
  filter: drop-shadow(0 0 20px #00f7ff);
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 10px #00f7ff); }
  to { filter: drop-shadow(0 0 30px #00f7ff); }
}

h1 {
  font-size: 40px;
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #00f7ff;
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: white;
}

.card {
  background: #111;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.links a {
  display: block;
  color: #00f7ff;
  margin: 5px;
  text-decoration: none;
}

.brand a {
  display: block;
  color: #00f7ff;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- LOGO -->
<img src="https://i.imgur.com/your-logo.png" class="logo">

<h1>Welcome to RIALO Protocol 🚀</h1>
<p>Decentralized Domain & Faucet System powered by Web3</p>

<button onclick="connectWallet()">Connect MetaMask</button>
<p id="wallet"></p>

<div class="card">
  <h3>💧 Faucet</h3>
  <button onclick="claimFaucet()">Claim RIALO</button>
</div>

<div class="card">
  <h3>🌐 RIALO Domains</h3>
  <input type="text" id="domain" placeholder="yourname.rialo">
  <br>
  <button onclick="registerDomain()">Register</button>
</div>

<!-- BRAND ASSETS -->
<div class="card brand">
  <h3>🎨 Brand Assets</h3>
  <p>Download official RIALO logos & media kit</p>
  <a href="https://rialo.io/brand-assets" target="_blank">
    Open Brand Assets
  </a>
</div>

<div class="card links">
  <h3>🌍 Community</h3>
  <a href="https://discord.gg/rialoprotocol" target="_blank">Discord</a>
  <a href="https://t.me/rialoprotocol" target="_blank">Telegram</a>
  <a href="https://x.com/RialoHQ" target="_blank">X (Twitter)</a>
</div>

<script>
let provider;
let signer;

async function connectWallet() {
  if (window.ethereum) {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    const address = await signer.getAddress();
    document.getElementById("wallet").innerText = "Connected: " + address;
  } else {
    alert("Install MetaMask!");
  }
}

function claimFaucet() {
  alert("You claimed RIALO tokens!");
}

function registerDomain() {
  let domain = document.getElementById("domain").value;
  if (!domain) return alert("Enter domain!");
  alert("Domain " + domain + " registered!");
}
</script>

</body>
</html>
