<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rialo Domains</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.container {
    width: 350px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(25px);
    box-shadow: 0 0 60px rgba(255,0,200,0.2);
    text-align: center;
}

/* LOGO */
.logo {
    width: 90px;
    margin-bottom: 10px;
    animation: spin 8s linear infinite;
    filter: drop-shadow(0 0 15px #ff00c8);
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* BRAND */
.brand {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #ff7a00, #ff00c8);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 20px;
}

/* INPUT */
.input-box {
    background: #111;
    border-radius: 15px;
    padding: 10px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border: none;
    background: transparent;
    color: white;
    outline: none;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 15px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(45deg, #ff7a00, #ff00c8);
    color: white;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Wallet */
.wallet {
    font-size: 12px;
    color: #aaa;
    margin-top: 10px;
}

/* Social */
.links a {
    display: block;
    margin-top: 10px;
    color: #aaa;
    text-decoration: none;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo-rialo.png" class="logo">
    <div class="brand">RIALO</div>

    <!-- DOMAIN INPUT -->
    <div class="input-box">
        <input type="text" id="domainInput" placeholder="Search domain...">
    </div>

    <button class="btn" onclick="searchDomain()">Search Domain</button>

    <button class="btn" onclick="connectWallet()">Connect Wallet</button>

    <!-- WALLET INFO -->
    <div class="wallet" id="walletAddress">Not connected</div>
    <div class="wallet" id="walletBalance"></div>

    <!-- LINKS -->
    <div class="links">
        <a href="https://x.com/RialoHQ">X (Twitter)</a>
        <a href="https://t.me/rialoprotocol">Telegram</a>
        <a href="https://discord.gg/rialoprotocol">Discord</a>
    </div>

</div>

<script>
let provider;
let signer;

async function connectWallet() {
    if (window.ethereum) {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();

        const address = await signer.getAddress();
        const balance = await provider.getBalance(address);

        document.getElementById("walletAddress").innerText =
            "Wallet: " + address.slice(0,6) + "..." + address.slice(-4);

        document.getElementById("walletBalance").innerText =
            "Balance: " + ethers.utils.formatEther(balance) + " ETH";
    } else {
        alert("Install MetaMask!");
    }
}

function searchDomain() {
    let domain = document.getElementById("domainInput").value;

    if (!domain) {
        alert("Masukkan domain dulu!");
        return;
    }

    let url = "https://monad.alldomains.id/buy-domain?domain=" + domain;
    window.open(url, "_blank");
}
</script>

</body>
</html>
